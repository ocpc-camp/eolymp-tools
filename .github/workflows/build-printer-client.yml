name: Build printer-client bundle

on:
  push:
    branches: [main]
    paths:
      - 'printing/client/**'
      - '.github/workflows/build-printer-client.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ghostscript via Chocolatey
        shell: pwsh
        run: choco install ghostscript --no-progress --yes

      - name: Download gsprint from upstream (Ghostgum GSview 5.0)
        shell: pwsh
        run: |
          $url = 'https://www.ghostgum.com.au/download/gsv50w64.exe'
          Invoke-WebRequest -Uri $url -OutFile gsv50w64.exe
          # GSview's installer is a 7-Zip self-extracting archive.
          7z x gsv50w64.exe -ogsv50_extracted -y | Out-Null
          Get-ChildItem -Path gsv50_extracted -Recurse -Filter gsprint.exe |
              Select-Object FullName

      - name: Download Python embeddable distribution
        shell: pwsh
        env:
          PY_VER: '3.12.7'
        run: |
          $url = "https://www.python.org/ftp/python/$env:PY_VER/python-$env:PY_VER-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath python-embed -Force

          # Embeddable Python ships with a pythonXY._pth that disables
          # site-packages and import of arbitrary directories. Patch it so
          # the bundled lib/ directory and "import site" work.
          $pth = Get-ChildItem -Path python-embed -Filter 'python*._pth' |
                 Select-Object -First 1
          if (-not $pth) { throw "python*._pth not found in embed zip" }
          # The zip stem (e.g. 'python312') is the file name without ._pth.
          $stem = $pth.BaseName
          @"
          $stem.zip
          .
          lib
          import site
          "@.Trim() | Set-Content -Path $pth.FullName -Encoding ascii

          # Bootstrap pip into the embed (used only at bundle build time).
          Invoke-WebRequest -Uri 'https://bootstrap.pypa.io/get-pip.py' -OutFile get-pip.py
          & python-embed\python.exe get-pip.py --no-warn-script-location
          & python-embed\python.exe -m pip --version

      - name: Pre-install Python dependencies into bundle
        shell: pwsh
        run: |
          # Install all required wheels into a 'lib' folder using the same
          # embeddable Python that will run on the user's machine. Native
          # wheels (pywin32) are picked correctly because we run on Windows.
          & python-embed\python.exe -m pip install `
              --target python-embed\lib `
              -r printing/client/bundle/requirements.txt
          # pywin32 ships its DLLs in pywin32_system32; copy them next to
          # python.exe so win32api can load them under embeddable Python.
          if (Test-Path python-embed\lib\pywin32_system32) {
              Copy-Item python-embed\lib\pywin32_system32\*.dll `
                        -Destination python-embed\ -Force
          }

      - name: Stage bundle
        shell: pwsh
        run: |
          $stage = "stage/printer-client"
          New-Item -ItemType Directory -Force -Path "$stage/vendor/ghostscript/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/vendor/gsprint" | Out-Null

          # --- Ghostscript binaries ---
          $gsRoot = Get-ChildItem -Path "C:\Program Files\gs" -Directory |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $gsRoot) {
              throw "Ghostscript install dir not found under C:\Program Files\gs"
          }
          Write-Host "Using Ghostscript from $($gsRoot.FullName)"
          Copy-Item -Path "$($gsRoot.FullName)\bin\*" `
                    -Destination "$stage/vendor/ghostscript/bin/" -Recurse
          if (Test-Path "$($gsRoot.FullName)\LICENSE") {
              Copy-Item "$($gsRoot.FullName)\LICENSE" `
                        -Destination "$stage/vendor/ghostscript/LICENSE.txt"
          }

          # --- gsprint ---
          $gsprint = Get-ChildItem -Path gsv50_extracted -Recurse -Filter gsprint.exe |
                     Select-Object -First 1
          if (-not $gsprint) {
              throw "gsprint.exe not found in extracted GSview archive"
          }
          Copy-Item $gsprint.FullName -Destination "$stage/vendor/gsprint/gsprint.exe"
          $gsviewLicense = Get-ChildItem -Path gsv50_extracted -Recurse `
                              -Include 'LICENSE*','COPYING*','*license*.txt' |
                           Select-Object -First 1
          if ($gsviewLicense) {
              Copy-Item $gsviewLicense.FullName `
                        -Destination "$stage/vendor/gsprint/LICENSE.txt"
          }

          # --- Python client + helpers (all from repo) ---
          Copy-Item printing/client/printer.py            -Destination "$stage/printer.py"
          Copy-Item printing/client/test_room_lookup.py   -Destination "$stage/test_room_lookup.py"
          Copy-Item printing/client/.env.sample           -Destination "$stage/.env.sample"
          Copy-Item printing/client/README.md             -Destination "$stage/README.md"
          Copy-Item printing/client/bundle/run.bat        -Destination "$stage/run.bat"
          Copy-Item LICENSE                               -Destination "$stage/LICENSE.txt"

          # --- Bundled Python (embeddable distribution + pre-installed deps) ---
          New-Item -ItemType Directory -Force -Path "$stage/python" | Out-Null
          Copy-Item -Path "python-embed/*" -Destination "$stage/python/" -Recurse

          # --- BUNDLE-NOTES.txt ---
          $notes = @(
            'OCPC eolymp-tools printer client - Windows bundle',
            '==================================================',
            '',
            "Built from: $env:GITHUB_REPOSITORY @ $env:GITHUB_SHA",
            "Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm UTC')",
            '',
            'Contents:',
            '  printer.py, test_room_lookup.py - the Python client (MIT)',
            '  .env.sample                     - copy to .env and edit',
            '  run.bat                         - one-click launcher',
            '  python/                         - Python embeddable distro + deps',
            '  vendor/ghostscript/             - Artifex Ghostscript binaries (AGPL)',
            '  vendor/gsprint/gsprint.exe      - from Ghostgum GSview 5.0 (AFPL)',
            '',
            'See README.md for usage. Re-download a newer build from:',
            '  https://github.com/ocpc-camp/eolymp-tools/releases'
          ) -join "`r`n"
          $notes | Out-File -FilePath "$stage/BUNDLE-NOTES.txt" -Encoding utf8

          Write-Host "--- Bundle contents ---"
          Get-ChildItem -Recurse $stage | Select-Object FullName, Length

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path stage/printer-client/* `
                           -DestinationPath printer-client-windows.zip
          $size = (Get-Item printer-client-windows.zip).Length / 1MB
          Write-Host ("Bundle size: {0:N2} MB" -f $size)

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: printer-client-windows
          path: printer-client-windows.zip
          retention-days: 30

      - name: Update rolling "latest" release (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Delete the previous rolling release + tag so the new one
          # actually points at the current HEAD commit. Without this,
          # softprops/action-gh-release would refresh the asset but
          # leave the tag pinned at the first run, and GitHub would
          # then show "N commits to main since this release".
          gh release delete latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true

      - name: Publish rolling "latest" release (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest build
          prerelease: true
          body: |
            **Rolling build of the Windows printer client.**

            Always reflects the current `main` branch.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.run_id }}

            Download `printer-client-windows.zip` below, extract it,
            edit `.env`, then double-click `run.bat`.

            See [printing/client/README.md](https://github.com/ocpc-camp/eolymp-tools/blob/main/printing/client/README.md)
            for details.
          files: printer-client-windows.zip

      - name: Attach to tagged release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: printer-client-windows.zip
